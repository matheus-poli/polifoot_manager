databases:
  - name: polifoot-manager-db
    databaseName: polifoot_manager_production
    user: polifoot_manager
    plan: free

services:
  # Single Rails service with Solid Queue running inside Puma (cost-effective)
  - type: web
    name: polifoot-manager-single
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polifoot-manager-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: WEB_CONCURRENCY
        value: 1
      - key: RAILS_MAX_THREADS
        value: 2
      - key: SOLID_QUEUE_IN_PUMA
        value: true
      - key: JOB_CONCURRENCY
        value: 1
      - key: SOLID_QUEUE_POLLING_INTERVAL
        value: 2