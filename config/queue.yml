default: &default
  dispatchers:
    - polling_interval: <%= ENV.fetch("SOLID_QUEUE_POLLING_INTERVAL", 1) %>
      batch_size: 100
      concurrency_maintenance_interval: 600
  workers:
    - queues: "*"
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
