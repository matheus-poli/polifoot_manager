databases:
  - name: polifoot-manager-db
    databaseName: polifoot_manager_production
    user: polifoot_manager
    plan: free

services:
  # Main Rails web service
  - type: web
    name: polifoot-manager-web
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polifoot-manager-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: RAILS_MAX_THREADS
        value: 3

  # Solid Queue background worker
  - type: worker
    name: polifoot-manager-worker
    runtime: ruby
    plan: starter
    buildCommand: "bundle install"
    startCommand: "bundle exec rails solid_queue:start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polifoot-manager-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: JOB_CONCURRENCY
        value: 1
      - key: SOLID_QUEUE_POLLING_INTERVAL
        value: 1
